<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central do Adm</title>
  <link class="icon" href="https://i.ibb.co/8LqSRDLB/logo-sem-fundo.png" type="image/png">
  
  <style>
    /* Reset global para evitar que bordas e paddings quebrem a largura */
    * {
      box-sizing: border-box;
    }

    body { 
      font-family: sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 16px; /* Garante margem de segurança caso a tela seja menor que o card */
      position: relative;
      overflow-x: hidden;
    }

    /* Camada mágica que rotaciona a imagem de fundo sem afetar o card de login */
    body::before {
      content: "";
      position: fixed;
      /* Define uma área maior para garantir que as bordas não sumam na rotação */
      top: -50vh;
      left: -50vw;
      width: 200vw;
      height: 200vh;
      background-image: url('https://i.ibb.co/twJd6BRq/Whats-App-Image-2026-06-29-at-10-42-05.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: rotate(90deg); /* Rotaciona a imagem em 90 graus */
      z-index: -1; /* Joga para trás de tudo */
    }

    .login-card { 
      /* Fundo com leve transparência e desfoque para dar leitura aos textos sobre a foto */
      background: rgba(225, 216, 205, 0.95); 
      backdrop-filter: blur(4px);
      padding: 40px 30px; 
      border-radius: 12px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
      width: calc(100% - 32px); /* Espaçamento seguro e centralizado nas laterais mobile */
      max-width: 360px; 
      text-align: center; 
      position: relative; /* Mantém o card acima do background */
    }

    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; margin-bottom: 6px; color: #12364e; font-weight: bold; font-size: 14px; }
    .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; background-color: white; }
    
    /* NOVA ESTILIZAÇÃO PARA O CAMPO DE SENHA */
    .senha-container { position: relative; display: flex; align-items: center; width: 100%; }
    .senha-container input { padding-right: 40px; } /* Garante que o texto da senha não fique embaixo do olho */
    
    .toggle-senha { 
      position: absolute; 
      right: 12px; 
      cursor: pointer; 
      user-select: none; 
      font-size: 18px; 
      -webkit-tap-highlight-color: transparent; 
    }

    .btn-login { 
      width: 100%; 
      padding: 12px; 
      background-color: #d9b246; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      font-weight: bold; 
      font-size: 15px;
      cursor: pointer; 
      transition: background-color 0.3s ease, transform 0.1s ease; 
      -webkit-tap-highlight-color: transparent;
    }
    .btn-login:hover { background-color: #af8a23; }
    .btn-login:active { transform: scale(0.98); }

    #mensagem { margin-top: 15px; font-weight: 500; font-size: 14px; }
    .erro { color: #d93025; font-weight: bold; }
    .sucesso { color: #188038; font-weight: bold; }
  </style>
</head>
<body>

  <div class="login-card">
    <form id="loginForm">
      <div class="input-group">
        <label>Usuário</label>
        <input type="text" id="usuario" placeholder="Ex: admin" required>
      </div>
      <div class="input-group">
        <label>Senha</label>
        <div class="senha-container">
          <input type="password" id="senha" required>
          <span class="toggle-senha" id="btnToggleSenha">👁️</span>
        </div>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
    <div id="mensagem"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    // Suas credenciais oficiais do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDj8QWo0f_n5Tn56ka7UzIGSUo9OmpGv9U",
      authDomain: "central-adm-bolafora.firebaseapp.com",
      databaseURL: "https://central-adm-bolafora-default-rtdb.firebaseio.com",
      projectId: "central-adm-bolafora",
      storageBucket: "central-adm-bolafora.firebasestorage.app",
      messagingSenderId: "429477810517",
      appId: "1:429477810517:web:3be6c842269cbdfe4b5fdc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Configura a sessão de forma isolada e limpa logo no carregamento
    setPersistence(auth, browserSessionPersistence).catch(err => console.error(err));

    // --- LÓGICA DE MOSTRAR / OCULTAR SENHA ---
    const senhaInput = document.getElementById('senha');
    const btnToggleSenha = document.getElementById('btnToggleSenha');

    btnToggleSenha.addEventListener('click', () => {
      if (senhaInput.type === 'password') {
        senhaInput.type = 'text';
        btnToggleSenha.innerText = '🙈'; 
      } else {
        senhaInput.type = 'password';
        btnToggleSenha.innerText = '👁️'; 
      }
    });

    // --- ENVIO DO FORMULÁRIO ---
    const form = document.getElementById('loginForm');
    
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      
      const usuarioDigitado = document.getElementById('usuario').value.trim();
      const senha = senhaInput.value; 
      const msgEl = document.getElementById('mensagem');
      
      msgEl.className = '';
      msgEl.innerText = 'Verificando...';

      // Criação automática do email interno caso insira apenas o nome de usuário
      const emailCompleto = usuarioDigitado.includes('@') ? usuarioDigitado : `${usuarioDigitado}@bolafora.internal`;

      // O fluxo de login continua direto, legível e limpo
      signInWithEmailAndPassword(auth, emailCompleto, senha)
      .then((userCredential) => {
        msgEl.className = 'sucesso';
        msgEl.innerText = 'Login realizado com sucesso!';
        
        setTimeout(function() {
          window.location.href = 'dashboard.html'; 
        }, 1500);
      })
      .catch((error) => {
        console.error("Código do erro:", error.code);
        msgEl.className = 'erro';
        
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          msgEl.innerText = 'Usuário ou senha incorretos.';
        } else if (error.code === 'auth/invalid-email') {
          msgEl.innerText = 'Formato de usuário inválido.';
        } else {
          msgEl.innerText = 'Erro ao fazer login. Tente novamente.';
        }
      });
    });
  </script>
</body>
</html>
