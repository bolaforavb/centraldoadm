<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central do Adm</title>
  <link class="icon" href="https://i.ibb.co/8LqSRDLB/logo-sem-fundo.png" type="image/png">
  
  <!-- IMPORTANDO A FONTE BEBAS NEUE DO GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
    }

    body { 
      font-family: sans-serif; 
      background-color: #12364e; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-start; /* Mudado de center para flex-start para puxar o conteúdo para cima */
      align-items: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 40px 16px 16px 16px; /* Ajustado o padding do topo para controlar o espaço em branco */
    }

    .login-header {
      text-align: center;
      margin-bottom: 15px; /* Reduzido levemente de 20px para 15px */
      width: 100%;
      max-width: 360px;
    }
    .login-logo {
      width: 90px;
      height: auto;
      display: block;
      margin: 0 auto 5px auto; /* Reduzido o espaço abaixo da logo */
      filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.4));
    }
    .login-title {
      font-family: 'Bebas Neue', sans-serif; 
      color: #d9b246; 
      font-size: 42px; 
      font-weight: normal; 
      margin: 0;
      letter-spacing: 1px; 
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); 
    }

    .login-card { 
      background: #e1d8cd; 
      padding: 40px 30px 25px 30px; 
      border-radius: 12px; 
      box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
      width: calc(100% - 32px); 
      max-width: 360px; 
      text-align: center; 
    }

    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; margin-bottom: 6px; color: #12364e; font-weight: bold; font-size: 14px; }
    .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; background-color: white; }
    
    .senha-container { position: relative; display: flex; align-items: center; width: 100%; }
    .senha-container input { padding-right: 40px; } 
    
    .toggle-senha { 
      position: absolute; 
      right: 12px; 
      cursor: pointer; 
      user-select: none; 
      font-size: 18px; 
      -webkit-tap-highlight-color: transparent; 
    }

    /* BOTÃO PRINCIPAL (DOURADO) */
    .btn-login { 
      width: 100%; 
      padding: 12px; 
      background-color: #d9b246; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      font-weight: bold; 
      font-size: 15px;
      cursor: pointer; 
      transition: background-color 0.3s ease, transform 0.1s ease; 
      -webkit-tap-highlight-color: transparent;
    }
    .btn-login:hover { background-color: #af8a23; }
    .btn-login:active { transform: scale(0.98); }

    /* BOTÃO SECUNDÁRIO ATUALIZADO (SEM BORDA) */
    .btn-secondary {
      width: 100%; 
      padding: 12px; 
      background-color: #12364e; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      font-weight: bold; 
      font-size: 15px;
      cursor: pointer; 
      margin-top: 12px; 
      transition: background-color 0.3s ease, transform 0.1s ease; 
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:hover { 
      background-color: #1c4f72; 
    }
    .btn-secondary:active { transform: scale(0.98); }

    /* MENSAGEM DINÂMICA */
    #mensagem { font-weight: 500; font-size: 14px; }
    #mensagem:not(:empty) { margin-top: 15px; } 
    .erro { color: #d93025; font-weight: bold; }
    .sucesso { color: #188038; font-weight: bold; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="login-header">
    <img src="https://i.ibb.co/8LqSRDLB/logo-sem-fundo.png" alt="Logo" class="login-logo">
    <h1 class="login-title">Central do Adm</h1>
  </div>

  <div class="login-card">
    <!-- FORMULÁRIO DE LOGIN ORIGINAL -->
    <form id="loginForm">
      <div class="input-group">
        <label>Usuário</label>
        <input type="text" id="usuario" required>
      </div>
      <div class="input-group">
        <label>Senha</label>
        <div class="senha-container">
          <input type="password" id="senha" required>
          <span class="toggle-senha" id="btnToggleSenhaLogin">👁️</span>
        </div>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
      <button type="button" class="btn-secondary" id="btnIrParaAlterar">Alterar senha padrão</button>
    </form>

    <!-- NOVO FORMULÁRIO DE ALTERAÇÃO DE SENHA -->
    <form id="alterarForm" class="hidden">
      <div class="input-group">
        <label>Usuário</label>
        <input type="text" id="altUsuario" placeholder="Ex: admin" required>
      </div>
      <div class="input-group">
        <label>Senha Atual</label>
        <div class="senha-container">
          <input type="password" id="altSenhaAtual" required>
          <span class="toggle-senha" id="btnToggleAtual">👁️</span>
        </div>
      </div>
      <div class="input-group">
        <label>Nova Senha</label>
        <div class="senha-container">
          <input type="password" id="altNovaSenha" placeholder="Mínimo 6 caracteres" required>
          <span class="toggle-senha" id="btnToggleNova">👁️</span>
        </div>
      </div>
      <button type="submit" class="btn-login">Atualizar Senha</button>
      <button type="button" class="btn-secondary" id="btnVoltarLogin">Voltar para o Login</button>
    </form>

    <div id="mensagem"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, updatePassword, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDj8QWo0f_n5Tn56ka7UzIGSUo9OmpGv9U",
      authDomain: "central-adm-bolafora.firebaseapp.com",
      databaseURL: "https://central-adm-bolafora-default-rtdb.firebaseio.com",
      projectId: "central-adm-bolafora",
      storageBucket: "central-adm-bolafora.firebasestorage.app",
      messagingSenderId: "429477810517",
      appId: "1:429477810517:web:3be6c842269cbdfe4b5fdc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    setPersistence(auth, browserSessionPersistence).catch(err => console.error(err));

    const msgEl = document.getElementById('mensagem');

    const loginForm = document.getElementById('loginForm');
    const alterarForm = document.getElementById('alterarForm');
    const btnIrParaAlterar = document.getElementById('btnIrParaAlterar');
    const btnVoltarLogin = document.getElementById('btnVoltarLogin');

    btnIrParaAlterar.addEventListener('click', () => {
      loginForm.classList.add('hidden');
      alterarForm.classList.remove('hidden');
      msgEl.innerText = '';
    });

    btnVoltarLogin.addEventListener('click', () => {
      alterarForm.classList.add('hidden');
      loginForm.removeAttribute('class'); 
      msgEl.innerText = '';
    });

    function configurarOlho(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      btn.addEventListener('click', () => {
        if (input.type === 'password') {
          input.type = 'text';
          btn.innerText = '🙈';
        } else {
          input.type = 'password';
          btn.innerText = '👁️';
        }
      });
    }
    configurarOlho('senha', 'btnToggleSenhaLogin');
    configurarOlho('altSenhaAtual', 'btnToggleAtual');
    configurarOlho('altNovaSenha', 'btnToggleNova');

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const usuarioDigitado = document.getElementById('usuario').value.trim();
      const senha = document.getElementById('senha').value; 
      
      msgEl.className = '';
      msgEl.innerText = 'Verificando...';

      const emailCompleto = usuarioDigitado.includes('@') ? usuarioDigitado : `${usuarioDigitado}@bolafora.internal`;

      signInWithEmailAndPassword(auth, emailCompleto, senha)
      .then(() => {
        msgEl.className = 'sucesso';
        msgEl.innerText = 'Login realizado com sucesso!';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      })
      .catch((error) => {
        msgEl.className = 'erro';
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          msgEl.innerText = 'Usuário ou senha incorretos.';
        } else {
          msgEl.innerText = 'Erro ao fazer login.';
        }
      });
    });

    alterarForm.addEventListener('submit', (event) => {
      event.preventDefault();
      
      const usuarioDigitado = document.getElementById('altUsuario').value.trim();
      const senhaAtual = document.getElementById('altSenhaAtual').value;
      const novaSenha = document.getElementById('altNovaSenha').value;

      if(novaSenha.length < 6) {
        msgEl.className = 'erro';
        msgEl.innerText = 'A nova senha precisa ter no mínimo 6 dígitos.';
        return;
      }

      msgEl.className = '';
      msgEl.innerText = 'Validando credenciais atuais...';

      const emailCompleto = usuarioDigitado.includes('@') ? usuarioDigitado : `${usuarioDigitado}@bolafora.internal`;

      signInWithEmailAndPassword(auth, emailCompleto, senhaAtual)
      .then((userCredential) => {
        msgEl.innerText = 'Atualizando para a nova senha...';
        return updatePassword(userCredential.user, novaSenha);
      })
      .then(() => {
        msgEl.className = 'sucesso';
        msgEl.innerText = 'Senha atualizada! Redirecionando para o painel...';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
      })
      .catch((error) => {
        msgEl.className = 'erro';
        console.error(error);
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          msgEl.innerText = 'Usuário ou senha atual incorretos.';
        } else {
          msgEl.innerText = 'Não foi possível alterar. Tente novamente.';
        }
      });
    });
  </script>
</body>
</html>
