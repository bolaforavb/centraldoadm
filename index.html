<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Central do Adm</title>
  <link rel="icon" href="https://i.ibb.co/8LqSRDLB/logo-sem-fundo.png" type="image/png">
  
  <style>
    body { font-family: sans-serif; background-color: #12364e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-card { background: #e1d8cd; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); width: 100%; max-width: 360px; text-align: center; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; margin-bottom: 6px; color: #12364e; }
    .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .btn-login { width: 100%; padding: 12px; background-color: #d9b246; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease, transform 0.1s ease; }
    .btn-login:hover { background-color: #af8a23; }
    .btn-login:active { transform: scale(0.98); }

    #mensagem { margin-top: 15px; font-weight: 500; }
    .erro { color: #d93025; }
    .sucesso { color: #188038; }
  </style>
</head>
<body>

  <div class="login-card">
    <form id="loginForm">
      <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="usuario" placeholder="seu-email@dominio.com" required>
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="senha" required>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
    <div id="mensagem"></div>
  </div>

  <script type="module">
    // 1. Importando as funções oficiais do Firebase (Versão 12.15.0)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    // 2. Suas credenciais reais do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDj8QWo0f_n5Tn56ka7UzIGSUo9OmpGv9U",
      authDomain: "central-adm-bolafora.firebaseapp.com",
      databaseURL: "https://central-adm-bolafora-default-rtdb.firebaseio.com",
      projectId: "central-adm-bolafora",
      storageBucket: "central-adm-bolafora.firebasestorage.app",
      messagingSenderId: "429477810517",
      appId: "1:429477810517:web:3be6c842269cbdfe4b5fdc"
    };

    // 3. Inicializando o Firebase e o serviço de Autenticação
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 4. Capturando o formulário e monitorando o clique do botão de entrar
    const form = document.getElementById('loginForm');
    
    form.addEventListener('submit', (event) => {
      event.preventDefault(); // Impede a página de recarregar
      
      const email = document.getElementById('usuario').value.trim();
      const senha = document.getElementById('senha').value;
      const msgEl = document.getElementById('mensagem');
      
      msgEl.className = '';
      msgEl.innerText = 'Verificando...';

      // 5. Fazendo o login com o Firebase Authentication
      signInWithEmailAndPassword(auth, email, senha)
      .then((userCredential) => {
        // Se der certo:
        msgEl.className = 'sucesso';
        msgEl.innerText = 'Login realizado com sucesso!';
        
        setTimeout(function() {
          window.location.href = 'dashboard.html'; // Troque aqui pelo link da sua página principal pós-login
        }, 1500);
      })
      .catch((error) => {
        // Se der erro:
        console.error("Código do erro:", error.code);
        msgEl.className = 'erro';
        
        // Mensagens personalizadas baseadas no erro do Firebase
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          msgEl.innerText = 'E-mail ou senha incorretos.';
        } else if (error.code === 'auth/invalid-email') {
          msgEl.innerText = 'Por favor, digite um formato de e-mail válido.';
        } else {
          msgEl.innerText = 'Erro ao fazer login. Tente novamente.';
        }
      });
    });
  </script>
</body>
</html>
