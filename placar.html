<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Placar Digital - Central do Adm</title>
  <link class="icon" href="https://i.ibb.co/8LqSRDLB/logo-sem-fundo.png" type="image/png">
  
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: sans-serif;
      background-color: #12364e; 
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      color: #12364e;
      overflow: hidden;
    }

    .topo-acoes {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr; 
      align-items: center;
      padding: 12px 12px 0 12px;
      margin-bottom: 8px;
    }

    .topo-esquerda {
      display: flex;
      justify-content: flex-start;
      gap: 8px;
    }

    .topo-centro {
      display: flex;
      justify-content: center;
    }

    .topo-direita {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    .btn-topo-discreto {
      background-color: transparent;
      color: #e1d8cd;
      border: 1px solid #e1d8cd;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: bold;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background-color 0.2s, color 0.2s;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-topo-discreto:hover {
      background-color: #e1d8cd;
      color: #12364e;
    }

    .btn-fixar-notif {
      border-color: #2196f3;
      color: #2196f3;
    }
    
    .btn-fixar-notif:hover {
      background-color: #2196f3;
      color: #fff;
    }

    .btn-zerar-placar {
      background-color: #d93025;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: background-color 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-zerar-placar:hover {
      background-color: #b3241c;
    }

    .btn-zerar-placar:active {
      transform: scale(0.98);
    }

    .container-placar-global {
      width: 100%;
      max-width: 900px;
      padding: 0 12px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
    }

    .estrutura-placar {
      display: flex;
      background-color: white;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    .estrutura-placar::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 4px;
      background-color: #e1d8cd;
      transform: translateX(-50%);
      z-index: 2;
    }

    .container-central {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-central {
      width: 90px;
      height: auto;
      pointer-events: none;
      filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2));
    }

    .btn-apito {
      background-color: #12364e;
      color: #e1d8cd;
      border: 2px solid #e1d8cd;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
      transition: transform 0.1s, background-color 0.2s;
    }

    .btn-apito:active {
      transform: scale(0.90);
      background-color: #1d4f71;
    }

    .lado-placar {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
    }

    .area-ponto {
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      min-height: 52vh;
      transition: background-color 0.1s;
    }
    
    .area-ponto:active {
      background-color: rgba(217, 178, 70, 0.1);
    }

    .seletor-cor-time {
      background: #f7f5f2;
      color: #12364e;
      border: 1px solid #12364e;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
      cursor: pointer;
      outline: none;
      z-index: 11;
      transition: background-color 0.3s, color 0.3s;
    }

    .op-amarelo { background-color: #ffeb3b !important; color: #000 !important; }
    .op-azul { background-color: #2196f3 !important; color: #fff !important; }
    .op-roxo { background-color: #9c27b0 !important; color: #fff !important; }
    .op-rosa { background-color: #e91e63 !important; color: #fff !important; }
    .op-padrao { background-color: #f7f5f2 !important; color: #12364e !important; }

    .numero-pontos {
      font-size: clamp(230px, 24vh, 250px);
      font-weight: bold;
      color: #12364e;
      margin: 0;
      line-height: 1;
    }

    .controles-lado {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-top: 8px;
      z-index: 3;
    }

    .btn-menos-um {
      background-color: #f7f5f2;
      color: #12364e;
      border: 2px solid #12364e;
      border-radius: 10px;
      padding: 8px 24px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .btn-menos-um:active {
      transform: scale(0.95);
      background-color: #e1d8cd;
    }

    @media (orientation: portrait) {
      .aviso-orientacao {
        display: flex;
      }
    }

    .aviso-orientacao {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #12364e;
      color: #e1d8cd;
      z-index: 9999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }
    .aviso-orientacao span {
      font-size: 40px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div class="aviso-orientacao">
    <span>🔄📱</span>
    <h2>Por favor, vire o seu aparelho de lado.</h2>
    <p>O placar foi otimizado para o modo horizontal (paisagem).</p>
  </div>

  <header class="topo-acoes">
    <div class="topo-esquerda">
      <a href="dashboard.html" class="btn-topo-discreto">Central do Adm</a>
      <a href="https://louisebraga.github.io/tabela-bola-fora/" class="btn-topo-discreto">Ir para a tabela</a>
    </div>
    
    <div class="topo-centro">
      <button class="btn-zerar-placar" onclick="zerarPlacar()">Zerar Placar</button>
    </div>
    
    <div class="topo-direita">
      <button class="btn-topo-discreto btn-fixar-notif" onclick="enviarLembreteResultado()">📌 Fixar Resultado</button>
      <button class="btn-topo-discreto" onclick="alternarTelaCheia()" id="btnFullscreen">🔲 Tela Cheia</button>
    </div>
  </header>

  <div class="container-placar-global">
    
    <main class="estrutura-placar" id="placar-main">
      
      <div class="container-central">
        <img src="https://i.ibb.co/8LqSRDLB/logo-sem-fundo.png" alt="Logo Bola Fora" class="logo-central">
        <button class="btn-apito" 
                onpointerdown="iniciarApito(event)" 
                onpointerup="pararApito(event)" 
                onpointerleave="pararApito(event)" 
                title="Segure para Apitar">📢</button>
      </div>
      
      <div class="lado-placar">
        <div class="area-ponto" onclick="adicionarPonto('esquerda', event)">
          <select class="seletor-cor-time" id="cor-esquerda" onclick="event.stopPropagation()" onchange="mudarCor('esquerda')">
            <option value="" class="op-padrao">Cor</option>
            <option value="Amarelo" class="op-amarelo">Amarelo</option>
            <option value="Azul" class="op-azul">Azul</option>
            <option value="Roxo" class="op-roxo">Roxo</option>
            <option value="Rosa" class="op-rosa">Rosa</option>
          </select>
          <div class="numero-pontos" id="pts-esquerda">0</div>
        </div>
        <div class="controles-lado">
          <button class="btn-menos-um" onclick="subtrairPonto('esquerda')">-1</button>
        </div>
      </div>

      <div class="lado-placar">
        <div class="area-ponto" onclick="adicionarPonto('direita', event)">
          <select class="seletor-cor-time" id="cor-direita" onclick="event.stopPropagation()" onchange="mudarCor('direita')">
            <option value="" class="op-padrao">Cor</option>
            <option value="Amarelo" class="op-amarelo">Amarelo</option>
            <option value="Azul" class="op-azul">Azul</option>
            <option value="Roxo" class="op-roxo">Roxo</option>
            <option value="Rosa" class="op-rosa">Rosa</option>
          </select>
          <div class="numero-pontos" id="pts-direita">0</div>
        </div>
        <div class="controles-lado">
          <button class="btn-menos-um" onclick="subtrairPonto('direita')">-1</button>
        </div>
      </div>

    </main>

  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDj8QWo0f_n5Tn56ka7UzIGSUo9OmpGv9U",
      databaseURL: "https://central-adm-bolafora-default-rtdb.firebaseio.com/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const placarRef = db.ref('placar_digital');

    let placarLocal = {
      esquerda: 0,
      direita: 0,
      corEsquerda: "",
      corDireita: ""
    };

    const estilosCores = {
      "Amarelo": { bg: "#ffeb3b", text: "#000" },
      "Azul": { bg: "#2196f3", text: "#fff" },
      "Roxo": { bg: "#9c27b0", text: "#fff" },
      "Rosa": { bg: "#e91e63", text: "#fff" },
      "": { bg: "#f7f5f2", text: "#12364e" }
    };

    // --- ENGENHARIA DE ÁUDIO VIA WEB AUDIO API (ARQUIVO .WAV) ---
    let audioContext;
    let audioBuffer;
    let audioSource = null;
    let estaTocando = false;

    fetch('https://bolaforavb.github.io/centraldoadm/apito.wav')
      .then(response => response.arrayBuffer())
      .then(arrayBuffer => {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        return audioContext.decodeAudioData(arrayBuffer);
      })
      .then(buffer => {
        audioBuffer = buffer;
      })
      .catch(err => console.error("Erro ao carregar o arquivo .wav do repositório:", err));

    function iniciarApito(event) {
      if (event) {
        if (event.cancelable) event.preventDefault();
      }
      
      if (!audioBuffer || estaTocando) return;

      // Garante a ativação do áudio no Mobile (essencial para iOS/Android)
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
      }

      estaTocando = true;

      audioSource = audioContext.createBufferSource();
      audioSource.buffer = audioBuffer;
      audioSource.loop = true;

      // CORTE CIRÚRGICO VIA HARDWARE:
      audioSource.loopStart = 0.15; // Pula os primeiros 150 milissegundos
      audioSource.loopEnd = audioBuffer.duration - 0.40; // Corta os 400 milissegundos finais

      audioSource.connect(audioContext.destination);
      audioSource.start(0);
    }

    function pararApito(event) {
      if (event && event.cancelable) event.preventDefault();
      estaTocando = false;
      
      if (audioSource) {
        try {
          audioSource.stop();
        } catch(e) {}
        audioSource = null;
      }
    }
    // ---------------------------------------------------------------

    function atualizarAparenciaSeletor(lado, cor) {
      const select = document.getElementById(`cor-${lado}`);
      const estilo = estilosCores[cor] || estilosCores[""];
      if (select) {
        select.style.backgroundColor = estilo.bg;
        select.style.color = estilo.text;
      }
    }

    placarRef.on('value', (snapshot) => {
      const dadosNuvem = snapshot.val();
      if (dadosNuvem) {
        placarLocal = dadosNuvem;
        
        const elemEsq = document.getElementById('pts-esquerda');
        const elemDir = document.getElementById('pts-direita');
        const selEsq = document.getElementById('cor-esquerda');
        const selDir = document.getElementById('cor-direita');

        if(elemEsq) elemEsq.innerText = placarLocal.esquerda || 0;
        if(elemDir) elemDir.innerText = placarLocal.direita || 0;
        if(selEsq) selEsq.value = placarLocal.corEsquerda || "";
        if(selDir) selDir.value = placarLocal.corDireita || "";

        atualizarAparenciaSeletor('esquerda', placarLocal.corEsquerda || "");
        atualizarAparenciaSeletor('direita', placarLocal.corDireita || "");
      } else {
        placarRef.set({ esquerda: 0, opacity: 0, direita: 0, corEsquerda: "", corDireita: "" });
      }
    });

    function adicionarPonto(lado, event) {
      if (event && event.target.tagName === 'SELECT') return;
      placarLocal[lado] = (placarLocal[lado] || 0) + 1;
      placarRef.set(placarLocal);
    }

    function subtrairPonto(lado) {
      if (placarLocal[lado] > 0) {
        placarLocal[lado] -= 1;
        placarRef.set(placarLocal);
      }
    }

    function mudarCor(lado) {
      const valorCor = document.getElementById(`cor-${lado}`).value;
      if (lado === 'esquerda') {
        placarLocal.corEsquerda = valorCor;
      } else {
        placarLocal.corDireita = valorCor;
      }
      placarRef.set(placarLocal);
    }

    function zerarPlacar() {
      if (confirm("Deseja reiniciar a contagem do placar para 0 x 0?")) {
        placarRef.set({ esquerda: 0, direita: 0, corEsquerda: "", corDireita: "" });
      }
    }

    function enviarLembreteResultado() {
      if (!("Notification" in window)) {
        alert("Este navegador não suporta notificações de sistema.");
        return;
      }

      const timeEsq = placarLocal.corEsquerda || "Time Esquerdo";
      const timeDir = placarLocal.corDireita || "Time Direito";
      const pontosEsq = placarLocal.esquerda || 0;
      const pontosDir = placarLocal.direita || 0;

      const titulo = "Bola Fora - Resultado Guardado 📌";
      const opcoesNotificacao = {
        body: `${timeEsq} ${pontosEsq} x ${pontosDir} ${timeDir}`,
        icon: 'https://i.ibb.co/8LqSRDLB/logo-sem-fundo.png',
        tag: 'resultado-placar', 
        requireInteraction: true 
      };

      if (Notification.permission === "granted") {
        dispararNotificacao(titulo, opcoesNotificacao);
      } else if (Notification.permission !== "denied") {
        Notification.requestPermission().then(permission => {
          if (permission === "granted") {
            dispararNotificacao(titulo, opcoesNotificacao);
          }
        });
      } else {
        alert("As notificações estão bloqueadas no seu navegador. Ative-as nas configurações do site para usar o lembrete.");
      }
    }

    function dispararNotificacao(titulo, opcoes) {
      if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(registration => {
          registration.showNotification(titulo, opcoes);
        });
      } else {
        new Notification(titulo, opcoes);
      }
    }

    function alternarTelaCheia() {
      const botao = document.getElementById('btnFullscreen');
      if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        const elemento = document.documentElement;
        if (elemento.requestFullscreen) { elemento.requestFullscreen(); } 
        else if (elemento.webkitRequestFullscreen) { elemento.webkitRequestFullscreen(); } 
        else if (elemento.msRequestFullscreen) { elemento.msRequestFullscreen(); }
        botao.innerText = "🔳 Sair do Fullscreen";
      } else {
        if (document.exitFullscreen) { document.exitFullscreen(); } 
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); } 
        else if (document.msExitFullscreen) { document.msExitFullscreen(); }
        botao.innerText = "🔲 Tela Cheia";
      }
    }

    function monitorarMudancaTelaCheia() {
      const botao = document.getElementById('btnFullscreen');
      if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        botao.innerText = "🔲 Tela Cheia";
      }
    }

    document.addEventListener('fullscreenchange', monitorarMudancaTelaCheia);
    document.addEventListener('webkitfullscreenchange', monitorarMudancaTelaCheia);
    document.addEventListener('msfullscreenchange', monitorarMudancaTelaCheia);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const code = "self.addEventListener('notificationclick', function(event) { event.notification.close(); });";
        const blob = new Blob([code], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);
        
        navigator.serviceWorker.register(workerUrl).then(reg => {
          console.log('Service Worker de notificações ativado.');
        }).catch(err => {
          console.error('Erro ao registrar Service Worker:', err);
        });
      });
    }
  </script>

</body>
</html>
