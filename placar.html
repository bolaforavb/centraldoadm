<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Placar Digital - Central do Adm</title>
  <link class="icon" href="https://i.ibb.co/8LqSRDLB/logo-sem-fundo.png" type="image/png">
  
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; /* Evita selecionar o texto ao clicar rápido nos pontos */
    }

    body {
      font-family: sans-serif;
      background-color: #12364e; 
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      color: #12364e;
      overflow: hidden;
    }

    /* Barra superior configurada com 3 colunas de larguras exatamente iguais (1fr) */
    /* Isso garante a centralização absoluta do bloco do meio, ignorando o tamanho dos lados */
    .topo-acoes {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr; 
      align-items: center;
      padding: 12px 12px 0 12px;
      margin-bottom: 8px;
    }

    /* Alinhamentos precisos de cada bloco */
    .topo-esquerda {
      display: flex;
      justify-content: flex-start;
      gap: 8px; /* Espaço uniforme entre Página Inicial e Ir para a tabela */
    }

    .topo-centro {
      display: flex;
      justify-content: center;
    }

    .topo-direita {
      display: flex;
      justify-content: flex-end;
    }

    /* Botões discretos do topo (Página Inicial, Tabela e Tela Cheia) */
    .btn-topo-discreto {
      background-color: transparent;
      color: #e1d8cd;
      border: 1px solid #e1d8cd;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 11px; /* Ajuste sutil no tamanho da fonte para não estourar em telas menores */
      font-weight: bold;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background-color 0.2s, color 0.2s;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-topo-discreto:hover {
      background-color: #e1d8cd;
      color: #12364e;
    }

    /* Botão de Zerar centralizado */
    .btn-zerar-placar {
      background-color: #d93025;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: background-color 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-zerar-placar:hover {
      background-color: #b3241c;
    }

    .btn-zerar-placar:active {
      transform: scale(0.98);
    }

    /* Container global */
    .container-placar-global {
      width: 100%;
      max-width: 900px;
      padding: 0 12px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
    }

    /* Estrutura principal */
    .estrutura-placar {
      display: flex;
      background-color: white;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    /* Divisória vertical */
    .estrutura-placar::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 4px;
      background-color: #e1d8cd;
      transform: translateX(-50%);
      z-index: 2;
    }

    /* Imagem estrita na meiota centralizada */
    .logo-central {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 90px; /* Tamanho ajustável do logo */
      height: auto;
      pointer-events: none; /* Garante que cliques passem direto para os botões de ponto */
      filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2)); /* Destaca o logo sobre a linha */
    }

    /* Lados do Placar */
    .lado-placar {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
    }

    /* Área de clique do ponto */
    .area-ponto {
      width: 100%;
      display: flex;
      flex-direction: column; /* Alterado para empilhar o select e o número verticalmente */
      justify-content: center;
      align-items: center;
      cursor: pointer;
      min-height: 52vh;
      transition: background-color 0.1s;
    }
    
    .area-ponto:active {
      background-color: rgba(217, 178, 70, 0.1);
    }

    /* Campo de seleção de cor acima da pontuação */
    .seletor-cor-time {
      background: #f7f5f2;
      color: #12364e;
      border: 1px solid #12364e;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
      cursor: pointer;
      outline: none;
      z-index: 11; /* Garante que o clique abra o select e não dispare o ponto */
    }

    .numero-pontos {
      font-size: clamp(230px, 24vh, 250px); /* Ajustado levemente para acomodar o select sem quebras */
      font-weight: bold;
      color: #12364e;
      margin: 0;
      line-height: 1;
    }

    /* Controles individuais */
    .controles-lado {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-top: 8px;
      z-index: 3;
    }

    /* Botão -1 */
    .btn-menos-um {
      background-color: #f7f5f2;
      color: #12364e;
      border: 2px solid #12364e;
      border-radius: 10px;
      padding: 8px 24px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .btn-menos-um:active {
      transform: scale(0.95);
      background-color: #e1d8cd;
    }

    /* Alerta de orientação */
    @media (orientation: portrait) {
      .aviso-orientacao {
        display: flex;
      }
    }

    .aviso-orientacao {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #12364e;
      color: #e1d8cd;
      z-index: 9999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }
    .aviso-orientacao span {
      font-size: 40px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div class="aviso-orientacao">
    <span>🔄📱</span>
    <h2>Por favor, vire o seu aparelho de lado.</h2>
    <p>O placar foi otimizado para o modo horizontal (paisagem).</p>
  </div>

  <header class="topo-acoes">
    <div class="topo-esquerda">
      <a href="dashboard.html" class="btn-topo-discreto">Central do Adm</a>
      <a href="https://louisebraga.github.io/tabela-bola-fora/" class="btn-topo-discreto">Ir para a tabela</a>
    </div>
    
    <div class="topo-centro">
      <button class="btn-zerar-placar" onclick="zerarPlacar()">Zerar Placar</button>
    </div>
    
    <div class="topo-direita">
      <button class="btn-topo-discreto" onclick="alternarTelaCheia()" id="btnFullscreen">🔲 Tela Cheia</button>
    </div>
  </header>

  <div class="container-placar-global">
    
    <main class="estrutura-placar">
      
      <!-- Imagem centralizada na meiota -->
      <img src="https://i.ibb.co/8LqSRDLB/logo-sem-fundo.png" alt="Logo Bola Fora" class="logo-central">
      
      <div class="lado-placar">
        <div class="area-ponto" onclick="adicionarPonto('esquerda', event)">
          <select class="seletor-cor-time" id="cor-esquerda" onclick="event.stopPropagation()" onchange="mudarCor('esquerda')">
            <option value="">Selecionar Cor</option>
            <option value="Amarelo">Amarelo</option>
            <option value="Azul">Azul</option>
            <option value="Roxo">Roxo</option>
            <option value="Rosa">Rosa</option>
          </select>
          <div class="numero-pontos" id="pts-esquerda">0</div>
        </div>
        <div class="controles-lado">
          <button class="btn-menos-um" onclick="subtrairPonto('esquerda')">-1</button>
        </div>
      </div>

      <div class="lado-placar">
        <div class="area-ponto" onclick="adicionarPonto('direita', event)">
          <select class="seletor-cor-time" id="cor-direita" onclick="event.stopPropagation()" onchange="mudarCor('direita')">
            <option value="">Selecionar Cor</option>
            <option value="Amarelo">Amarelo</option>
            <option value="Azul">Azul</option>
            <option value="Roxo">Roxo</option>
            <option value="Rosa">Rosa</option>
          </select>
          <div class="numero-pontos" id="pts-direita">0</div>
        </div>
        <div class="controles-lado">
          <button class="btn-menos-um" onclick="subtrairPonto('direita')">-1</button>
        </div>
      </div>

    </main>

  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Configurações fornecidas do seu Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDj8QWo0f_n5Tn56ka7UzIGSUo9OmpGv9U",
      databaseURL: "https://central-adm-bolafora-default-rtdb.firebaseio.com/"
    };
    
    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Referência do nó do placar em tempo real
    const placarRef = db.ref('placar_digital');

    // Estado local sincronizado incluindo as cores por padrão
    let placarLocal = {
      esquerda: 0,
      direita: 0,
      corEsquerda: "",
      corDireita: ""
    };

    // Ouvir mudanças na nuvem em tempo real e atualizar a tela
    placarRef.on('value', (snapshot) => {
      const dadosNuvem = snapshot.val();
      if (dadosNuvem) {
        placarLocal = dadosNuvem;
        document.getElementById('pts-esquerda').innerText = placarLocal.esquerda || 0;
        document.getElementById('pts-direita').innerText = placarLocal.direita || 0;
        
        // Atualiza a seleção dos selects na tela caso venha de outro dispositivo
        document.getElementById('cor-esquerda').value = placarLocal.corEsquerda || "";
        document.getElementById('cor-direita').value = placarLocal.corDireita || "";
      } else {
        placarRef.set({ esquerda: 0, direita: 0, corEsquerda: "", corDireita: "" });
      }
    });

    // Função para somar ponto ao clicar na área numérica (ignorando cliques vindos do select)
    function adicionarPonto(lado, event) {
      if (event && event.target.tagName === 'SELECT') return;
      
      placarLocal[lado] = (placarLocal[lado] || 0) + 1;
      placarRef.set(placarLocal);
    }

    // Função para diminuir ponto
    function subtrairPonto(lado) {
      if (placarLocal[lado] > 0) {
        placarLocal[lado] -= 1;
        placarRef.set(placarLocal);
      }
    }

    // Função executada ao alterar a cor no select
    function mudarCor(lado) {
      if (lado === 'esquerda') {
        placarLocal.corEsquerda = document.getElementById('cor-esquerda').value;
      } else {
        placarLocal.corDireita = document.getElementById('cor-direita').value;
      }
      placarRef.set(placarLocal);
    }

    // Função para zerar ambos os lados
    function zerarPlacar() {
      if (confirm("Deseja reiniciar a contagem do placar para 0 x 0?")) {
        placarRef.set({ esquerda: 0, direita: 0, corEsquerda: "", corDireita: "" });
      }
    }

    // Função para alternar o modo Tela Cheia
    function alternarTelaCheia() {
      const botao = document.getElementById('btnFullscreen');
      
      if (!document.fullscreenElement && 
          !document.webkitFullscreenElement && 
          !document.msFullscreenElement) {
        const elemento = document.documentElement;
        if (elemento.requestFullscreen) {
          element.requestFullscreen();
        } else if (elemento.webkitRequestFullscreen) {
          elemento.webkitRequestFullscreen();
        } else if (elemento.msRequestFullscreen) {
          elemento.msRequestFullscreen();
        }
        botao.innerText = "🔳 Sair do Fullscreen";
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
        botao.innerText = "🔲 Tela Cheia";
      }
    }

    function monitorarMudancaTelaCheia() {
      const botao = document.getElementById('btnFullscreen');
      if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
        botao.innerText = "🔲 Tela Cheia";
      }
    }

    document.addEventListener('fullscreenchange', monitorarMudancaTelaCheia);
    document.addEventListener('webkitfullscreenchange', monitorarMudancaTelaCheia);
    document.addEventListener('msfullscreenchange', monitorarMudancaTelaCheia);
  </script>

</body>
</html>
